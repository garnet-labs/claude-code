name: Garnet Claude Code CI
on:
  workflow_dispatch:
jobs:
  dep-install:
    name: Dependency Install (Garnet)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Garnet Runtime Visibility
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install anthropic SDK and deps
        run: pip install anthropic[all] httpx pydantic rich typer
      - name: Verify install
        run: python -c "import anthropic; print(anthropic.__version__)"

